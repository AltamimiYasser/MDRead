name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: |
          # Use the latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build archive
        run: |
          cd MDRead
          xcodebuild archive \
            -scheme MDRead \
            -configuration Release \
            -archivePath ${{ runner.temp }}/MDRead.xcarchive \
            -destination 'generic/platform=macOS' \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            SWIFT_DEFAULT_ACTOR_ISOLATION=MainActor \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          APP_PATH="${{ runner.temp }}/MDRead.xcarchive/Products/Applications/MDRead.app"
          DMG_DIR="${{ runner.temp }}/dmg-staging"
          mkdir -p "$DMG_DIR"

          # Copy app to staging
          cp -R "$APP_PATH" "$DMG_DIR/"

          # Create symlink to Applications folder
          ln -s /Applications "$DMG_DIR/Applications"

          # Create DMG
          hdiutil create \
            -volname "MDRead" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "${{ runner.temp }}/MDRead.dmg"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MDRead ${{ steps.version.outputs.VERSION }}
          body: |
            ## MDRead ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `MDRead.dmg` below
            2. Open the DMG and drag `MDRead.app` to your Applications folder
            3. Open any `.md` file with MDRead

            > **Note:** Since this app is not notarized, you may need to right-click > Open the first time.
          files: ${{ runner.temp }}/MDRead.dmg
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
