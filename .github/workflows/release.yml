name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build archive
        run: |
          cd MDRead
          xcodebuild archive \
            -scheme MDRead \
            -configuration Release \
            -archivePath ${{ runner.temp }}/MDRead.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          APP_PATH="${{ runner.temp }}/MDRead.xcarchive/Products/Applications/MDRead.app"

          # Create a zip of the app
          cd "$(dirname "$APP_PATH")"
          zip -r -y ${{ runner.temp }}/MDRead.zip MDRead.app

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: MDRead ${{ steps.version.outputs.VERSION }}
          body: |
            ## MDRead ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `MDRead.zip` below
            2. Unzip and drag `MDRead.app` to your Applications folder
            3. Open any `.md` file with MDRead

            > **Note:** Since this app is not notarized, you may need to right-click > Open the first time.
          files: ${{ runner.temp }}/MDRead.zip
          draft: false
          prerelease: false
